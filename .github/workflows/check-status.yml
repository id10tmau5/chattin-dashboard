name: Check DOC Status

on:
  # Manual trigger. mode selects the behavior:
  #   scrape       → headless portal lookup, commit status.json only (clean)
  #   scrape-debug → same, but also commit debug/ (page text + screenshot) for review
  #   manual       → owner-supplied status written straight to status.json
  #   clear-debug  → remove the debug/ folder from the repo
  workflow_dispatch:
    inputs:
      mode:
        description: 'scrape · scrape-debug · manual · clear-debug'
        type: choice
        options: [scrape, scrape-debug, manual, clear-debug]
        default: scrape
      manual_status:
        description: 'manual only: Inmate / Parolee / Discharged / Unknown'
        type: string
        default: ''
      manual_location:
        description: 'manual only: facility or district (optional)'
        type: string
        default: ''
      manual_notes:
        description: 'manual only: short note (optional)'
        type: string
        default: ''
      manual_lock:
        description: 'manual only: lock this value so daily scrapes won''t change it'
        type: string
        default: 'true'
  # Daily auto-refresh at 07:00 UTC year-round (≈3 AM ET — DST drift is harmless).
  # Scheduled runs are always plain 'scrape' (no debug commit).
  schedule:
    - cron: '0 7 * * *'

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── CLEAR DEBUG ─────────────────────────────────────────────────────────
      # Remove any committed debug/ folder from the repo and stop.
      - name: Clear debug folder
        if: ${{ inputs.mode == 'clear-debug' }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git rm -r --ignore-unmatch debug/ >/dev/null 2>&1 || true
          git diff --staged --quiet && echo "Nothing to clear" || \
            git commit -m "chore: clear debug folder $(date -u '+%Y-%m-%d %H:%M UTC')" && git push

      # ── MANUAL OVERRIDE ─────────────────────────────────────────────────────
      # Owner-supplied status. Inputs are passed via env (not interpolated into
      # the script body) to avoid quote breakage / injection.
      - name: Manual override
        if: ${{ inputs.mode == 'manual' && inputs.manual_status != '' }}
        env:
          M_STATUS:   ${{ inputs.manual_status }}
          M_LOCATION: ${{ inputs.manual_location }}
          M_NOTES:    ${{ inputs.manual_notes }}
          M_LOCK:     ${{ inputs.manual_lock }}
        run: |
          python3 << 'EOF'
          import json, os, datetime
          now = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          loc = os.environ.get('M_LOCATION','').strip() or None
          status = {
            "status":            os.environ['M_STATUS'].strip(),
            "currentLocation":   loc,
            "permanentLocation": None,
            "inmateNumber":      "PE1239",
            "paroleNumber":      "345JW",
            "lastDOCUpdate":     None,
            "age":               None,
            "notes":             (os.environ.get('M_NOTES','').strip()
                                  or "Status set manually by owner."),
            "sourcesChecked":    ["Manual owner override"],
            "confidence":        "High",
            "lastChecked":       now,
            "checkedBy":         "Manual override (owner)",
            "locked":            os.environ.get('M_LOCK','').strip().lower() == 'true',
          }
          json.dump(status, open('status.json','w'), indent=2)
          print(f"Manual override → {status['status']} ({loc or 'no location'})")
          EOF

      # ── AUTOMATED SCRAPE ────────────────────────────────────────────────────
      # Runs for daily cron and for scrape / scrape-debug dispatches.
      - name: Set up Python
        if: ${{ inputs.mode != 'manual' && inputs.mode != 'clear-debug' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium
        if: ${{ inputs.mode != 'manual' && inputs.mode != 'clear-debug' }}
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Scrape PA DOC Inmate Locator
        if: ${{ inputs.mode != 'manual' && inputs.mode != 'clear-debug' }}
        env:
          CHECKED_BY: >-
            ${{ github.event_name == 'schedule'
                && 'GitHub Actions (automatic daily scrape)'
                || 'GitHub Actions (manual scrape)' }}
        run: python3 scripts/scrape_status.py

      - name: Upload scrape debug artifacts
        if: ${{ always() && inputs.mode != 'manual' && inputs.mode != 'clear-debug' }}
        uses: actions/upload-artifact@v4
        with:
          name: scrape-debug
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      # ── COMMIT ──────────────────────────────────────────────────────────────
      # Always commit status.json (scrape + manual). Only commit debug/ when the
      # owner explicitly chose scrape-debug, so normal/daily runs stay clean.
      - name: Commit results
        if: ${{ always() && inputs.mode != 'clear-debug' }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add status.json
          if [ "${{ inputs.mode }}" = "scrape-debug" ]; then
            git add -f debug/ 2>/dev/null || true
          fi
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "chore: status check $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
