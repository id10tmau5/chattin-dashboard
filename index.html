<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PA DOC Status Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #091623; color: #30C080;
      font-family: monospace; font-size: 14px; flex-direction: column; gap: 12px;
    }
    input, textarea, button, select { font-family: inherit; }
    a { cursor: pointer; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="load-msg">⌛ Loading dashboard…</div>
    <div style="font-size:11px;opacity:0.5;">PA DOC Status Dashboard</div>
    <div id="err-detail" style="display:none;font-size:10px;color:#8AAECE;max-width:320px;line-height:1.6;text-align:center;word-break:break-all"></div>
  </div>
  <div id="root" style="display:none"></div>

  <script>
    window.onerror = function(msg, src, line, col, error) {
      var el  = document.getElementById('loading');
      var msgEl = document.getElementById('load-msg');
      var det = document.getElementById('err-detail');
      if (el)    { el.style.display = 'flex'; el.style.padding = '30px'; el.style.textAlign = 'center'; }
      if (msgEl) { msgEl.style.color = '#F06060'; msgEl.textContent = '⚠ Runtime error'; }
      if (det)   { det.style.display = 'block'; det.textContent = (msg || '') + ' — ' + (src || '').split('/').pop() + ':' + line; }
      var root = document.getElementById('root');
      if (root)  root.style.display = 'none';
      return false;
    };
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"
    onerror="document.getElementById('load-msg').style.color='#F06060';document.getElementById('load-msg').textContent='⚠ CDN blocked: react.production.min.js'"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    onerror="document.getElementById('load-msg').style.color='#F06060';document.getElementById('load-msg').textContent='⚠ CDN blocked: react-dom.production.min.js'"></script>

  <script src="./mugshot-data.js"
    onerror="document.getElementById('load-msg').style.color='#F06060';document.getElementById('load-msg').textContent='⚠ Failed to load mugshot-data.js'"></script>

  <script src="./chattin-case-dashboard.js?v=165650"
    onerror="document.getElementById('load-msg').style.color='#F06060';document.getElementById('load-msg').textContent='⚠ Failed to load chattin-case-dashboard.js'"></script>

  <script>
    try {
      if (!window.React || !window.ReactDOM) {
        throw new Error('React or ReactDOM failed to load from CDN');
      }
      if (typeof CaseDashboard !== 'function') {
        throw new Error('CaseDashboard not defined — chattin-case-dashboard.js may have an error');
      }
      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').style.display = 'block';
      var root = ReactDOM.createRoot(document.getElementById('root'), {
        onRecoverableError: function(err) {
          window.onerror('React recovered from: ' + err.message, 'react', 0, 0, err);
        }
      });
      root.render(React.createElement(CaseDashboard));
    } catch (e) {
      var el  = document.getElementById('loading');
      var msgEl = document.getElementById('load-msg');
      var det = document.getElementById('err-detail');
      if (el)    { el.style.display = 'flex'; el.style.padding = '30px'; el.style.textAlign = 'center'; }
      if (msgEl) { msgEl.style.color = '#F06060'; msgEl.textContent = '⚠ Initialization error'; }
      if (det)   { det.style.display = 'block'; det.textContent = e.message; }
    }
  </script>
</body>
</html>
